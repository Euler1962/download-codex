name: Download Codex Package
on: [workflow_dispatch]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download packages via curl
        run: |
          mkdir artifact
          cd artifact
          # Скачиваем основную оболочку
          curl -O https://npmjs.org
          # Скачиваем бинарный движок для Windows напрямую из реестра
          curl -O https://npmjs.org
      - name: Upload zip archive
        uses: actions/upload-artifact@v4
        with:
          name: openai-codex-package
          path: ./artifact/
