name: Download Codex Package
on: [workflow_dispatch]

jobs:
  download:
    runs-on: windows-latest  # Запускаем облачного робота на чистой Windows Server
    steps:
      - name: Force download both packages via npm
        run: |
          mkdir artifact
          cd artifact
          # Качаем оба файла стандартной командой в среде Windows
          npm pack @openai/codex@0.119.0
          npm pack @openai/codex-win32-x64@0.119.0
      - name: Upload zip archive
        uses: actions/upload-artifact@v4
        with:
          name: openai-codex-package
          path: ./artifact/
